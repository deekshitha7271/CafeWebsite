  <title>Cá Phê Bistro | Artisan Vietnamese Coffee & Bistro Experience</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://res.cloudinary.com">

  <!--
    LCP Preload — URL matches exactly the src rendered by MenuPage.jsx hero <motion.img>.
    Previously pointed to the wrong image (v1777180127) causing the "preloaded but not used" warning.
    formatImageUrl(..., 800) produces: f_auto,q_auto,w_800 + the path below.
  -->
  <link rel="preload"
    href="https://res.cloudinary.com/dqxhjnhrt/image/upload/f_auto,q_auto,w_800/v1777180127/coffee-topped-with-whipped-cream-coffee-seeds_ttwybl.png"
    as="image" fetchpriority="high" />

  <!-- Google Fonts — non-blocking (rel=preload swap trick eliminates render-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap">
  </noscript>
</head>
